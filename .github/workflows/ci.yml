name: CI/CD — Habit Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Tests & qualité du code
  # ─────────────────────────────────────────
  test:
    name: Tests PHP
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: habit_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, curl, pdo_mysql, openssl, fileinfo, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copie du .env de test
        run: cp .env.example .env.testing

      - name: Configuration de l'environnement de test
        run: |
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env.testing
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=habit_test/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env.testing

      - name: Génération de la clé d'application
        run: php artisan key:generate --env=testing

      - name: Migrations de test
        run: php artisan migrate --env=testing --force

      - name: Lancement des tests
        run: php artisan test --env=testing

  # ─────────────────────────────────────────
  # JOB 2 : Déploiement automatique
  # (uniquement sur push vers main)
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.20.168
          port: 65002
          username: u526846542
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/u526846542/domains/dri-vale.org/public_html
            php artisan down --retry=10
            git pull origin main
            HOME=/home/u526846542 composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan up
